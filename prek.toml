[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"

[[repos.hooks]]
id = "end-of-file-fixer"
args = [
    "--fix",
]

[[repos.hooks]]
id = "trailing-whitespace"

[[repos.hooks]]
id = "check-json"

[[repos.hooks]]
id = "check-toml"

[[repos.hooks]]
id = "check-yaml"


[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.12" # Ruff version.

[[repos.hooks]]
id = "ruff-check"
args = [
    "--fix",
]
types_or = [
    "python",
    "pyi",
]

[[repos.hooks]]
id = "ruff-format"
types_or = [
    "python",
    "pyi",
]
